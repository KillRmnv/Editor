<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- Горизонтальная пунктирная ось по центру -->
  <line x1="2" y1="12" x2="22" y2="12" stroke-dasharray="3 3" />
  
  <!-- Верхний треугольник (увеличен, отодвинут от центра) -->
  <!-- Tip y=9, Base y=2 -->
  <polygon points="12,9 4,2 20,2" />
  
  <!-- Нижний треугольник (увеличен, отодвинут от центра) -->
  <!-- Tip y=15, Base y=22 -->
  <polygon points="12,15 4,22 20,22" />
</svg>